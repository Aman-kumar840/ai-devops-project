name: AI DevOps CI Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-monitor:
    runs-on: ubuntu-latest
    
    # 🚨 THIS IS THE MISSING PIECE: It tells GitHub to go into your React folder first!
    defaults:
      run:
        working-directory: ./ai-devops-frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Dependencies
      # We pipe this to build.log so if install fails, the AI gets the install error!
      run: npm install > build.log 2>&1

    - name: Run Build (And Capture Errors)
      # We use >> to append to the log instead of overwriting it
      run: npm run build >> build.log 2>&1

    - name: Send Error to AI Assistant
      if: failure() 
      run: |
        echo "🚨 Build failed! Extracting logs..."
        
        # Grab the last 50 lines of the error log
        ERROR_LOG=$(tail -n 50 build.log)
        
        # Package it into a clean JSON format
        jq -n \
          --arg name "GitHub-Action-#${{ github.run_number }}" \
          --arg log "$ERROR_LOG" \
          '{buildName: $name, logOutput: $log}' > payload.json
        
        curl -X POST "https://six-baboons-like.loca.lt/api/webhook" \
         -H "Content-Type: application/json" \
         -H "Bypass-Tunnel-Reminder: true" \
         -d @payload.json
